name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    name: lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
          python-version: "3.12"
      - name: Install dev dependencies #only for testing & linter
        run: pip install -e ".[dev]"
      - name: lint
        run: ruff check 
      - name: test
        run: pytest -v
      - name: build
        run: |
          pip install build
          python -m build
